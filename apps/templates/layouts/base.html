<!DOCTYPE html>
<html> <!-- سويت الملف علشان اجمع التصميم بمكان واحد واقلل التكرار -->
{% load static %}
<head>
    <title>{% block title %}{% endblock title %}</title>
    <meta name="keywords" content="Books, recent, Learning, library">
    <meta name="description" content="Books website">
    <meta name="author" content="author name">
    <link rel="icon" href="{% static 'qu-icon.png' %}">
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{% static 'styles.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"> <!-- lab6 لمربع البحث-->
    {% block stylesheets %}{% endblock stylesheets %}
</head>
<body>

    {% include "includes/header.html" %}
    {% block content %}{% endblock content %}
    {% include "includes/footer.html" %}

</body>
</html>
